# Configuración H2 para tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate auto DDL - crea el schema automáticamente
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Deshabilita Open-in-View para tests
spring.jpa.open-in-view=false

# JWT para tests de integración
authorization.jwt.secret=this-is-a-test-secret-key-for-jwt-integration-tests-2025
authorization.jwt.expiration.days=1

# Mail (valores dummy para carga del contexto, no se envían correos)
spring.mail.username=test
spring.mail.password=test
spring.mail.from.address=test@example.com
spring.mail.from.name=Test

# Documentación (valores dummy para carga del contexto)
documentation.application.contact.name=Test Contact
documentation.application.contact.email=test@example.com

name: Backend CI/CD - Deploy to Azure App Service

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 🧪 CONTINUOUS INTEGRATION (CI)
  build-and-test:
    name: 🧪 Build & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests with Maven
        run: mvn clean test

  # 🚀 CONTINUOUS DEPLOYMENT (CD)
  deploy:
    name: 🚀 Deploy to Azure App Service
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Iniciar sesión en Azure usando un Service Principal
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Build and Deploy Container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'demy-backend'
          images: |
            ${{ secrets.AZURE_REGISTRY_SERVER }}/demy-backend:${{ github.sha }}
